name: play
purpose: Start or continue a concrete adventure session using selected world, scenario, and protagonist state.

routing:
  entry_hints:
    - start new adventure
    - begin adventure
    - choose world
    - generate a character for play
    - continue adventure
    - play next turn
    - resolve action
    - narrate scene
    - update consequences
  default_skills:
    - play-bootstrap-adventure
    - play-run-adventure
    - image-generate
    - image-save

boundaries:
  owns:
    - player-facing bootstrap into a playable adventure
    - scene progression inside one adventure
    - consequence resolution and state updates
    - player-facing narration and choices
    - temporary image generation for the active adventure context
    - saving approved temporary images into versioned adventure content
  avoids:
    - global canon redesign
    - standalone lore reference requests
    - step-by-step progress chatter after the initial processing acknowledgement

interaction:
  progress_style: single_ack_then_result
  acknowledgement: short
