name: master
purpose: Create, edit, and govern RPG canon and reusable playable content.

routing:
  entry_hints:
    - create world
    - edit scenario
    - design character
    - promote local canon
    - move adventure entity to world
    - update lore
  default_skills:
    - master-bootstrap-world
    - master-bootstrap-scenario
    - master-bootstrap-scene
    - master-bootstrap-character
    - master-promote
    - master-edit-content
    - dev-file-link
    - image-generate
    - image-save

boundaries:
  owns:
    - world canon creation and editing
    - scenario creation and editing
    - reusable scene definition creation and editing in world or scenario scope
    - character creation and editing
    - promotion of local entities into broader canon scopes
    - reusable content preparation before play
    - direct file-link output for workspace artifacts when inspection is useful
    - temporary image generation for canon-bearing content
    - saving approved images into versioned canon-bearing content
  avoids:
    - live turn-by-turn play narration
    - read-only reference workflows when no edits are needed
    - engine or product contract refactors outside workspace content and `rules/workspace/`
    - step-by-step progress chatter after the initial processing acknowledgement

interaction:
  progress_style: single_ack_then_result
  acknowledgement: short
