name: master
purpose: Create, edit, and govern RPG canon, playable content, and adventure setup.

routing:
  entry_hints:
    - create world
    - edit scenario
    - design character
    - prepare adventure
    - update lore
  default_skills:
    - master-bootstrap-world
    - master-bootstrap-scenario
    - master-bootstrap-character
    - master-bootstrap-adventure
    - master-edit-content

boundaries:
  owns:
    - world canon creation and editing
    - scenario creation and editing
    - character creation and editing
    - adventure setup before play
  avoids:
    - live turn-by-turn play narration
    - read-only reference workflows when no edits are needed
