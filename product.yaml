slug: rpg-engine
name: RPG Engine
purpose: Product layer for building, running, and referencing tabletop-style role-playing game content.
scope: Covers world canon, world-bound scenarios and characters, playable adventures, and reference access for RPG workflows.

mode_namespace:
  source: product
  default_mode: master
  modes:
    - master
    - play
    - ref

workspace:
  root: products/rpg-engine/workspace
  entities:
    - name: world
      purpose: Canon repository for one world together with its world-bound scenarios, characters, and support cards.
      primary_card: world.md
    - name: adventure
      purpose: Playthrough repository built from one world context, one scenario context, and one selected protagonist.
      primary_card: adventure.md
